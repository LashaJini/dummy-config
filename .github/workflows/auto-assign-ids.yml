name: Auto-assign AMM & Protocol IDs

on:
  push:
    branches: [master]
    paths:
      - "src/protocols/index.ts"
      - "src/network/*/amms.ts"

permissions:
  contents: write

jobs:
  auto-assign-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        # v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24

      - name: Auto-assign IDs
        run: node .github/scripts/auto-assign-ids.mjs .

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/protocols/index.ts 'src/network/*/amms.ts'
          git diff --staged --quiet && echo "No ID changes needed" && exit 0
          git commit -m "chore: auto-assign AMM & protocol IDs"
          git push
